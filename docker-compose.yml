# Axon server — Docker Compose configuration
#
# Default (SQLite):  docker compose up
# PostgreSQL:        docker compose --profile postgres up
#
# Stop:   docker compose down
# Reset:  docker compose down -v   (removes persistent volumes)

services:
  axon:
    build: .
    ports:
      - "4170:4170"
    volumes:
      - axon-data:/var/lib/axon
    environment:
      - AXON_NO_AUTH=true
      - AXON_STORAGE=sqlite
      - AXON_SQLITE_PATH=/var/lib/axon/axon.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4170/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    profiles: [postgres]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: axon
      POSTGRES_PASSWORD: axon
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axon"]
      interval: 5s
      timeout: 5s
      retries: 5

  axon-postgres:
    build: .
    profiles: [postgres]
    ports:
      - "4171:4171"
    environment:
      - AXON_NO_AUTH=true
      - AXON_STORAGE=postgres
      - AXON_HTTP_PORT=4171
      - AXON_POSTGRES_DSN=postgresql://axon:axon@postgres:5432/postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4171/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  axon-data:
  postgres-data:
