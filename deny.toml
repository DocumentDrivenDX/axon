# cargo-deny configuration for Axon
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2

[licenses]
version = 2
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
]

[bans]
# The current dependency graph legitimately pulls mixed major versions from
# unrelated ecosystems (notably async-graphql, postgres, and testcontainers).
# We still audit the tree, but we do not fail or warn CI on that transitive churn.
multiple-versions = "allow"
# Workspace dependencies appear as wildcards to cargo-deny; allow them.
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
