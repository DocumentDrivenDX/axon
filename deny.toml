# cargo-deny configuration for Axon
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2

[licenses]
version = 2
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
    "BSL-1.0",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
# Workspace dependencies appear as wildcards to cargo-deny; allow them.
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
