name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  test-kafka:
    name: Test (kafka feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # cmake and C toolchain required to compile librdkafka from source.
      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake
      - name: Test axon-audit with kafka feature
        run: cargo test -p axon-audit --features kafka

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --no-deps -- -D warnings -D clippy::todo -D clippy::unimplemented -D clippy::dbg_macro -D clippy::print_stdout -D clippy::unwrap_used

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  machete:
    name: Machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete crates

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  installer-service:
    name: Installer + Service (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: scripts/test-linux-installer-service.sh

  ui:
    name: UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install
      - run: cd ui && bun run typecheck
      - run: cd ui && bun run lint
      - run: cd ui && bun test src/
      - run: cd ui && bun run build

  e2e-postgres:
    name: E2E (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: axon
          POSTGRES_PASSWORD: axon
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      AXON_POSTGRES_DSN: postgresql://axon:axon@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install
      - run: cd ui && bun run build
      - run: cargo build -p axon-cli
      - name: Start Axon PostgreSQL E2E server
        run: |
          target/debug/axon serve \
            --no-auth \
            --storage postgres \
            --postgres-dsn "$AXON_POSTGRES_DSN" \
            --http-port 4171 \
            --ui-dir ui/build > /tmp/axon-e2e.log 2>&1 &
          echo $! > /tmp/axon-e2e.pid
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:4171/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/axon-e2e.log
          exit 1
      - run: cd ui && AXON_E2E_BASE_URL=http://host.docker.internal:4171 bun run test:e2e:postgres
