syntax = "proto3";

package axon.v1;

// ── Entity operations ─────────────────────────────────────────────────────────

message CreateEntityRequest {
  string collection = 1;
  string id = 2;
  string data_json = 3;
  string actor = 4;
}

message CreateEntityResponse {
  EntityProto entity = 1;
}

message GetEntityRequest {
  string collection = 1;
  string id = 2;
}

message GetEntityResponse {
  EntityProto entity = 1;
}

message UpdateEntityRequest {
  string collection = 1;
  string id = 2;
  string data_json = 3;
  uint64 expected_version = 4;
  string actor = 5;
}

message UpdateEntityResponse {
  EntityProto entity = 1;
}

message DeleteEntityRequest {
  string collection = 1;
  string id = 2;
  string actor = 3;
}

message DeleteEntityResponse {
  string collection = 1;
  string id = 2;
}

message EntityProto {
  string collection = 1;
  string id = 2;
  uint64 version = 3;
  string data_json = 4;
}

// ── Link operations ───────────────────────────────────────────────────────────

message CreateLinkRequest {
  string source_collection = 1;
  string source_id = 2;
  string target_collection = 3;
  string target_id = 4;
  string link_type = 5;
  string metadata_json = 6;
  string actor = 7;
}

message CreateLinkResponse {
  LinkProto link = 1;
}

message DeleteLinkRequest {
  string source_collection = 1;
  string source_id = 2;
  string target_collection = 3;
  string target_id = 4;
  string link_type = 5;
  string actor = 6;
}

message DeleteLinkResponse {
  string source_collection = 1;
  string source_id = 2;
  string target_collection = 3;
  string target_id = 4;
  string link_type = 5;
}

message TraverseRequest {
  string collection = 1;
  string id = 2;
  string link_type = 3;
  uint32 max_depth = 4;
}

message TraverseResponse {
  repeated EntityProto entities = 1;
}

message LinkProto {
  string source_collection = 1;
  string source_id = 2;
  string target_collection = 3;
  string target_id = 4;
  string link_type = 5;
  string metadata_json = 6;
}

// ── Audit operations ──────────────────────────────────────────────────────────

message QueryAuditByEntityRequest {
  string collection = 1;
  string entity_id = 2;
}

message QueryAuditByEntityResponse {
  repeated AuditEntryProto entries = 1;
}

message AuditEntryProto {
  uint64 id = 1;
  uint64 timestamp_ns = 2;
  string collection = 3;
  string entity_id = 4;
  uint64 version = 5;
  string mutation = 6;
  string data_before_json = 7;
  string data_after_json = 8;
  string actor = 9;
  string transaction_id = 10;
}

// ── Transaction operations ───────────────────────────────────────────────────

message TransactionOp {
  string op = 1;           // "create", "update", or "delete"
  string collection = 2;
  string id = 3;
  string data_json = 4;    // required for create/update
  uint64 expected_version = 5;  // required for update/delete
}

message CommitTransactionRequest {
  repeated TransactionOp operations = 1;
  string actor = 2;
}

message CommitTransactionResponse {
  string transaction_id = 1;
  repeated EntityProto entities = 2;
}

// ── Entity query operations ───────────────────────────────────────────────────

message QueryEntitiesRequest {
  string collection = 1;
  // Optional JSON-encoded FilterNode. Empty means no filter (return all).
  string filter_json = 2;
  // Maximum number of entities to return (0 = server default).
  uint32 limit = 3;
  // Pagination cursor: last entity ID seen. Empty to start from beginning.
  string after_id = 4;
}

message QueryEntitiesResponse {
  repeated EntityProto entities = 1;
  uint64 total_count = 2;
  // Cursor for next page. Empty when exhausted.
  string next_cursor = 3;
}

// ── Schema operations ─────────────────────────────────────────────────────────

message PutSchemaRequest {
  // JSON-encoded CollectionSchema.
  string schema_json = 1;
  string actor = 2;
  // If true, apply even if the change is classified as breaking.
  bool force = 3;
  // If true, return the diff without applying.
  bool dry_run = 4;
}

message PutSchemaResponse {
  // JSON-encoded CollectionSchema as stored.
  string schema_json = 1;
  // Compatibility classification (e.g. "compatible", "breaking"). Empty if unknown.
  string compatibility = 2;
  bool dry_run = 3;
}

message GetSchemaRequest {
  string collection = 1;
}

message GetSchemaResponse {
  // JSON-encoded CollectionSchema.
  string schema_json = 1;
}

// ── Collection lifecycle operations ──────────────────────────────────────────

message CreateCollectionRequest {
  string name = 1;
  // JSON-encoded CollectionSchema.
  string schema_json = 2;
  string actor = 3;
}

message CreateCollectionResponse {
  string name = 1;
}

message DropCollectionRequest {
  string name = 1;
  string actor = 2;
  // Must be true to confirm the destructive operation.
  bool confirm = 3;
}

message DropCollectionResponse {
  string name = 1;
  uint64 entities_removed = 2;
}

message ListCollectionsRequest {}

message CollectionMeta {
  string name = 1;
  uint64 entity_count = 2;
  // Schema version, 0 if no schema registered.
  uint32 schema_version = 3;
}

message ListCollectionsResponse {
  repeated CollectionMeta collections = 1;
}

message DescribeCollectionRequest {
  string name = 1;
}

message DescribeCollectionResponse {
  string name = 1;
  uint64 entity_count = 2;
  // JSON-encoded CollectionSchema. Empty if no schema registered.
  string schema_json = 3;
}

// ── Database and namespace lifecycle (FEAT-014) ────────────────────────────

message CreateDatabaseRequest {
  string name = 1;
}

message CreateDatabaseResponse {
  string name = 1;
}

message ListDatabasesRequest {}

message ListDatabasesResponse {
  repeated string databases = 1;
}

message DropDatabaseRequest {
  string name = 1;
  bool force = 2;
}

message DropDatabaseResponse {
  string name = 1;
  uint64 collections_removed = 2;
}

message CreateNamespaceRequest {
  string database = 1;
  string schema = 2;
}

message CreateNamespaceResponse {
  string database = 1;
  string schema = 2;
}

message ListNamespacesRequest {
  string database = 1;
}

message ListNamespacesResponse {
  string database = 1;
  repeated string schemas = 2;
}

message ListNamespaceCollectionsRequest {
  string database = 1;
  string schema = 2;
}

message ListNamespaceCollectionsResponse {
  string database = 1;
  string schema = 2;
  repeated string collections = 3;
}

message DropNamespaceRequest {
  string database = 1;
  string schema = 2;
  bool force = 3;
}

message DropNamespaceResponse {
  string database = 1;
  string schema = 2;
  uint64 collections_removed = 3;
}

// ── Service definition ────────────────────────────────────────────────────────

service AxonService {
  // Entity CRUD
  rpc CreateEntity(CreateEntityRequest) returns (CreateEntityResponse);
  rpc GetEntity(GetEntityRequest) returns (GetEntityResponse);
  rpc UpdateEntity(UpdateEntityRequest) returns (UpdateEntityResponse);
  rpc DeleteEntity(DeleteEntityRequest) returns (DeleteEntityResponse);
  // Entity query
  rpc QueryEntities(QueryEntitiesRequest) returns (QueryEntitiesResponse);
  // Link operations
  rpc CreateLink(CreateLinkRequest) returns (CreateLinkResponse);
  rpc DeleteLink(DeleteLinkRequest) returns (DeleteLinkResponse);
  rpc Traverse(TraverseRequest) returns (TraverseResponse);
  // Audit
  rpc QueryAuditByEntity(QueryAuditByEntityRequest) returns (QueryAuditByEntityResponse);
  // Transactions
  rpc CommitTransaction(CommitTransactionRequest) returns (CommitTransactionResponse);
  // Schema
  rpc PutSchema(PutSchemaRequest) returns (PutSchemaResponse);
  rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse);
  // Collection lifecycle
  rpc CreateCollection(CreateCollectionRequest) returns (CreateCollectionResponse);
  rpc DropCollection(DropCollectionRequest) returns (DropCollectionResponse);
  rpc ListCollections(ListCollectionsRequest) returns (ListCollectionsResponse);
  rpc DescribeCollection(DescribeCollectionRequest) returns (DescribeCollectionResponse);
  // Database and namespace lifecycle
  rpc CreateDatabase(CreateDatabaseRequest) returns (CreateDatabaseResponse);
  rpc ListDatabases(ListDatabasesRequest) returns (ListDatabasesResponse);
  rpc DropDatabase(DropDatabaseRequest) returns (DropDatabaseResponse);
  rpc CreateNamespace(CreateNamespaceRequest) returns (CreateNamespaceResponse);
  rpc ListNamespaces(ListNamespacesRequest) returns (ListNamespacesResponse);
  rpc ListNamespaceCollections(ListNamespaceCollectionsRequest) returns (ListNamespaceCollectionsResponse);
  rpc DropNamespace(DropNamespaceRequest) returns (DropNamespaceResponse);
}
