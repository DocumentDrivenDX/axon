[package]
name = "axon-graphql"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Auto-generated GraphQL schema from Axon collection schemas"

[lints]
workspace = true

[dependencies]
axon-core = { path = "../axon-core" }
axon-schema = { path = "../axon-schema" }
axon-api = { path = "../axon-api" }
axon-storage = { path = "../axon-storage" }
axon-audit = { path = "../axon-audit" }

async-graphql = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true, features = ["sync"] }

[dev-dependencies]
axon-api = { path = "../axon-api", features = ["test-fixtures"] }
